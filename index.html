<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JX Downloader</title>
    <style>
        :root {
            --primary: #ff0055;
            --primary-hover: #dd0044;
            --bg: #0d0d11;
            --card-bg: #16161f;
            --input-bg: #222230;
            --text: #ffffff;
            --text-muted: #8b8b9f;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 35px 25px;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo-area h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(45deg, #ff0055, #ff5500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-area p {
            color: var(--text-muted);
            font-size: 14px;
            margin: 5px 0 30px 0;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"], select {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 2px solid transparent;
            background-color: var(--input-bg);
            color: var(--text);
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #1c1c27;
        }

        .btn-download {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, var(--primary), #ff3300);
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(255, 0, 85, 0.3);
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .btn-download:active {
            transform: scale(0.98);
        }

        #status {
            margin-top: 20px;
            font-size: 14px;
            color: var(--primary);
            font-weight: 500;
            min-height: 20px;
        }

        /* Responsive Tweaks */
        @media (max-width: 480px) {
            .container {
                padding: 25px 20px;
            }
            .logo-area h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-area">
            <h1>JX Downloader</h1>
            <p>Download YouTube Videos & Audio Instantly</p>
        </div>

        <div class="form-group">
            <label for="url">YouTube URL</label>
            <input type="text" id="url" placeholder="Paste link here (e.g., https://youtu.be/...)">
        </div>

        <div class="form-group">
            <label for="type">Format</label>
            <select id="type" onchange="toggleQualityOptions()">
                <option value="video">Video (MP4)</option>
                <option value="audio">Audio (MP3)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="quality">Quality</label>
            <select id="quality">
                <option value="1080">1080p (Full HD)</option>
                <option value="720" selected>720p (HD)</option>
                <option value="480">480p</option>
                <option value="360">360p</option>
            </select>
        </div>

        <button class="btn-download" onclick="triggerDownload()">Download Now</button>
        
        <div id="status"></div>
    </div>

    <script>
        // Switch quality dropdown based on Video/Audio selection
        function toggleQualityOptions() {
            const type = document.getElementById('type').value;
            const qualitySelect = document.getElementById('quality');
            
            qualitySelect.innerHTML = ''; // Clear old choices

            if (type === 'video') {
                qualitySelect.innerHTML = `
                    <option value="1080">1080p (Full HD)</option>
                    <option value="720" selected>720p (HD)</option>
                    <option value="480">480p</option>
                    <option value="360">360p</option>
                `;
            } else {
                qualitySelect.innerHTML = `
                    <option value="320" selected>320 kbps (High Quality)</option>
                    <option value="256">256 kbps</option>
                    <option value="128">128 kbps (Standard)</option>
                `;
            }
        }

        async function triggerDownload() {
            const url = document.getElementById('url').value.trim();
            const type = document.getElementById('type').value;
            const quality = document.getElementById('quality').value;
            const statusDiv = document.getElementById('status');

            if (!url) {
                alert("Please paste a valid YouTube URL!");
                return;
            }

            statusDiv.innerText = "⚡ Requesting download parameters...";

            // UPDATE THIS LINE LATER WITH YOUR DEPLOYED BACKEND SERVER URL (Render/Koyeb)
            const BACKEND_URL = "https://your-backend-api.onrender.com/download";

            try {
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url, type: type, quality: quality })
                });

                if (response.ok) {
                    statusDiv.style.color = "#00ff88";
                    statusDiv.innerText = "🎉 Download initiated successfully!";
                } else {
                    statusDiv.style.color = "#ff3333";
                    statusDiv.innerText = "❌ Server error. Failed to download.";
                }
            } catch (error) {
                statusDiv.style.color = "#ff3333";
                statusDiv.innerText = "⚠️ Network error or Server offline.";
                console.error("Error:", error);
            }
        }
    </script>
</body>
</html>
